volumes:
  druid_shared: {}
  druid_coordinator_var: {}
  druid_broker_var: {}
  druid_historical_var: {}
  druid_middle_var: {}
  druid_router_var: {}
  druid_metadata: {}

services:
  kafka:
    build:
      context: kafka
      dockerfile: Dockerfile
    container_name: kafka
    ports:
      - 29092:29092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  postgres:
    image: postgres:16
    container_name: postgres
    volumes:
      - druid_metadata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: MiauPassword
      POSTGRES_USER: druid
      POSTGRES_DB: druid

  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    environment:
      ZOO_MY_ID: 1

  coordinator:
    image: apache/druid:36.0.0
    container_name: coordinator
    volumes:
      - druid_shared:/opt/shared
      - druid_coordinator_var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
    ports:
      - 8081:8081
    command:
      - coordinator
    env_file:
      - druid/druid.conf

  broker:
    image: apache/druid:36.0.0
    container_name: broker
    volumes:
      - druid_broker_var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    ports:
      - 8082:8082
    command:
      - broker
    env_file:
      - druid/druid.conf

  historical:
    image: apache/druid:36.0.0
    container_name: historical
    volumes:
      - druid_shared:/opt/shared
      - druid_historical_var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    ports:
      - 8083:8083
    command:
      - historical
    env_file:
      - druid/druid.conf

  middlemanager:
    image: apache/druid:36.0.0
    container_name: middlemanager
    volumes:
      - druid_shared:/opt/shared
      - druid_middle_var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    ports:
      - 8091:8091
      - 8100-8105:8100-8105
    command:
      - middleManager
    env_file:
      - druid/druid.conf

  router:
    image: apache/druid:36.0.0
    container_name: router
    volumes:
      - druid_router_var:/opt/druid/var
    depends_on:
      - zookeeper
      - postgres
      - coordinator
    ports:
      - 8888:8888
    command:
      - router
    env_file:
      - druid/druid.conf
