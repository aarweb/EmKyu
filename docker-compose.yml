volumes:
  druid_shared: {}
  druid_coordinator_var: {}
  druid_broker_var: {}
  druid_historical_var: {}
  druid_middle_var: {}
  druid_router_var: {}
  druid_metadata: {}
  kafka_data: {}

services:
  # Broker Kafka en modo KRaft (sin Zookeeper). Bus de eventos para trades y orderbook.
  kafka:
    build:
      context: kafka
      dockerfile: Dockerfile
    container_name: kafka
    ports:
      - 29092:29092
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  # Trabajo esporádico: espera a Kafka y crea los topics `trades` y `orderbook`.
  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
        echo 'Waiting for kafka...'; sleep 2;
      done;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic trades --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic orderbook --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic trades_fake --partitions 3 --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic orderbook_fake --partitions 3 --replication-factor 1;
      "
    restart: "no"

  # Base de datos de metadatos de Druid (segmentos, tasks, supervisors).
  postgres:
    image: postgres:16
    container_name: postgres
    volumes:
      - druid_metadata:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: MiauPassword
      POSTGRES_USER: druid
      POSTGRES_DB: druid
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U druid -d druid"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Coordinación interna del cluster Druid (descubrimiento y liderazgo).
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    environment:
      ZOO_MY_ID: 1
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status"]
      interval: 5s
      timeout: 10s
      retries: 20

  # Druid Coordinator: asigna segmentos a los historicals y gestiona limpieza.
  coordinator:
    image: apache/druid:36.0.0
    container_name: coordinator
    volumes:
      - druid_shared:/opt/shared
      - druid_coordinator_var:/opt/druid/var
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - 8081:8081
    command:
      - coordinator
    env_file:
      - druid/druid.conf
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8081/status"]
      interval: 10s
      timeout: 5s
      retries: 30

  # Druid Broker: recibe las queries y las reparte entre historicals y middlemanagers.
  broker:
    image: apache/druid:36.0.0
    container_name: broker
    volumes:
      - druid_broker_var:/opt/druid/var
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
      coordinator:
        condition: service_healthy
    ports:
      - 8082:8082
    command:
      - broker
    env_file:
      - druid/druid.conf

  # Druid Historical: sirve los segmentos publicados desde el almacenamiento profundo.
  historical:
    image: apache/druid:36.0.0
    container_name: historical
    volumes:
      - druid_shared:/opt/shared
      - druid_historical_var:/opt/druid/var
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
      coordinator:
        condition: service_healthy
    ports:
      - 8083:8083
    command:
      - historical
    env_file:
      - druid/druid.conf

  # Druid MiddleManager: ejecuta las tareas de ingesta (peones que consumen de Kafka).
  middlemanager:
    image: apache/druid:36.0.0
    container_name: middlemanager
    volumes:
      - druid_shared:/opt/shared
      - druid_middle_var:/opt/druid/var
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
      coordinator:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - 8091:8091
      - 8100-8105:8100-8105
    command:
      - middleManager
    env_file:
      - druid/druid.conf

  # Druid Router: front HTTP y consola web; enruta peticiones a coordinator/broker.
  router:
    image: apache/druid:36.0.0
    container_name: router
    volumes:
      - druid_router_var:/opt/druid/var
    depends_on:
      zookeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
      coordinator:
        condition: service_healthy
    ports:
      - 8888:8888
    command:
      - router
    env_file:
      - druid/druid.conf

  # App custom: conecta a los WebSockets de Bybit, Binance y Kraken y produce a Kafka.
  scrapping:
    build:
      context: scrapping
      dockerfile: Dockerfile
    container_name: scrapping
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_URL: kafka:9092
      TRAIT_TOPIC: trades
      ORDERBOOK_TOPIC: orderbook
      BYBIT_WS: wss://stream.bybit.com/v5/public/spot
      BINANCE_WS: wss://stream.binance.com:9443/ws
      KRAKEN_WS: wss://ws.kraken.com/v2
    restart: unless-stopped

  socket-gateway:
    build:
      context: EmKyuSocketGateway
      dockerfile: Dockerfile
    container_name: socket-gateway
    depends_on:
      druid-init:
        condition: service_completed_successfully
  # Trabajo esporádico: envía los *-supervisor.json al coordinator para arrancar la ingesta desde Kafka.
  druid-init:
    image: curlimages/curl:8.10.1
    container_name: druid-init
    depends_on:
      coordinator:
        condition: service_healthy
      middlemanager:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./druid:/supervisors:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://coordinator:8081/status >/dev/null; do
          echo 'Waiting for coordinator...'; sleep 3;
        done
        for spec in /supervisors/*-supervisor.json; do
          echo "Submitting $$spec"
          curl -sS -X POST -H 'Content-Type: application/json' --data-binary @$$spec http://coordinator:8081/druid/indexer/v1/supervisor
          echo
        done
    restart: "no"
